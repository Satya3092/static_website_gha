<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Portal</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 600px;
        }
        h1 {
            font-size: 3rem;
            color: #38bdf8;
        }
        p {
            font-size: 1.2rem;
            margin-top: 10px;
            color: #cbd5f5;
        }
        .btn {
            margin-top: 20px;
            padding: 12px 25px;
            border: none;
            background: #38bdf8;
            color: #0f172a;
            font-size: 1rem;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
        }
        .btn:hover {
            background: #0ea5e9;
        }
        footer {
            margin-top: 30px;
            font-size: 0.9rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Welcome DevOps Engineers</h1>
        <p>Automate. Deploy. Scale. Repeat.</p>
        <p>This site is deployed using GitHub Actions CI/CD pipeline.</p>

        <a href="#" class="btn">Start Building</a>

        <footer>
            <p>Powered by DevOps | CI/CD | Cloud</p>
        </footer>
    </div>
</body>
</html>
